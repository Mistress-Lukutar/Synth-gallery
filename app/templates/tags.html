<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Tag Management - Synth Gallery</title>
    <link rel="icon" type="image/svg+xml" href="{{ base_url }}/static/favicon.svg">
    <link rel="stylesheet" href="{{ base_url }}/static/style.css">
    <!-- EasyMDE Markdown Editor -->
    <link rel="stylesheet" href="{{ base_url }}/static/vendor/easymde/easymde.min.css">
    <link rel="stylesheet" href="{{ base_url }}/static/vendor/font-awesome/css/font-awesome.min.css">
    <script src="{{ base_url }}/static/vendor/easymde/easymde.min.js"></script>
    <style>
        .admin-layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .admin-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .admin-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .admin-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .admin-nav a:hover { color: var(--text); }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .toolbar input[type="search"] {
            align-self: stretch;
        }
        .toolbar .btn {
            display: inline-flex;
            align-items: center;
            font-size: 0.875rem;
        }
        .toolbar .btn svg {
            margin-right: 0.35rem;
        }
        .toolbar input[type="search"] {
            flex: 1;
            min-width: 200px;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text);
            font-size: 0.875rem;
        }
        .toolbar input[type="search"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            align-items: start;
        }
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .right-col .detail-panel {
            position: sticky;
            top: 1rem;
        }
        @media (max-width: 860px) {
            .main-layout { grid-template-columns: 1fr; }
            .right-col .detail-panel { position: static; }
        }

        /* Tag list */
        .tag-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .tag-category-block {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }
        .tag-category-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }
        .tag-list-item {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8125rem;
            position: relative;
            overflow: hidden;
        }
        .tag-list-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--tag-color);
            opacity: 0;
            transition: opacity .15s;
            z-index: 0;
        }
        .tag-list-item:hover::before {
            opacity: 0.35;
        }
        .tag-list-item:active::before,
        .tag-list-item.active::before {
            opacity: 0.2;
        }
        .tag-list-item:hover {
            border-color: var(--tag-color);
        }
        .tag-list-item:active,
        .tag-list-item.active {
            border-color: var(--tag-color);
        }
        .tag-list-item > * {
            position: relative;
            z-index: 1;
        }
        .tag-category-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
        .tag-category-header .cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }
        .tag-list-item .tag-name {
            font-weight: 500;
        }
        .tag-list-item .tag-meta {
            font-size: 0.6875rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Detail panel */
        .detail-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
        }
        .detail-panel.empty {
            color: var(--text-muted);
            text-align: center;
            padding: 3rem 1.25rem;
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .detail-header h2 {
            font-size: 1.125rem;
            flex: 1;
            margin: 0;
        }
        .detail-header .tag-chip {
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
        }
        .detail-section {
            margin-bottom: 1.25rem;
        }
        .detail-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin: 0 0 0.5rem 0;
        }

        /* Inline edit form */
        .inline-form {
            display: grid;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .inline-form input, .inline-form select {
            padding: 0.375rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.875rem;
        }
        .inline-form .form-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        /* Implication lists */
        .impl-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }
        .impl-list .tag-list-item {
            cursor: default;
        }
        .impl-list .tag-list-item .tag-actions {
            display: inline-flex;
            gap: 0.125rem;
            margin-top: 0;
        }
        .impl-list .tag-list-item .tag-actions button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.125rem;
            border-radius: 3px;
            line-height: 1;
        }
        .impl-list .tag-list-item .tag-actions button:hover {
            color: #ef4444;
            background: rgba(239,68,68,0.1);
        }
        .add-impl {
            display: flex;
            gap: 0.375rem;
            margin-top: 0.5rem;
        }
        .add-impl input {
            flex: 1;
            padding: 0.375rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.8125rem;
        }
        .add-impl button {
            padding: 0.375rem 0.625rem;
            font-size: 0.8125rem;
        }

        /* Related tags */
        .related-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }
        .related-chip {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            width: 100%;
            max-width: 420px;
        }
        .modal-box h2 {
            margin: 0 0 1rem 0;
            font-size: 1.125rem;
        }
        .modal-box .form-group {
            margin-bottom: 0.75rem;
        }
        .modal-box label {
            display: block;
            font-size: 0.8125rem;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
        }
        .modal-box input, .modal-box select {
            width: 100%;
            padding: 0.5rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: 5px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.875rem;
            box-sizing: border-box;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }



        .load-more {
            text-align: center;
            padding: 0.75rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .pagination-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding-top: 0.5rem;
        }
        .cat-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0;
            border-bottom: 1px solid var(--border);
        }
        .cat-row:last-child { border-bottom: none; }
        .cat-row input[type="text"] {
            flex: 1;
            padding: 0.25rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.875rem;
        }
        .cat-row input[type="color"] {
            width: 32px;
            height: 28px;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                    <line x1="7" y1="7" x2="7.01" y2="7"/>
                </svg>
                Tag Management
            </h1>
            <nav class="admin-nav">
                <a href="{{ base_url }}/admin/users">Users</a>
                <a href="{{ base_url }}/admin/api-keys">API Keys</a>
                <a href="{{ base_url }}/admin/backups">Backups</a>
                <a href="{{ base_url }}/admin/maintenance">Maintenance</a>
                <a href="{{ base_url }}/tags" class="active">Tags</a>
                <span style="color: var(--border);">|</span>
                <a href="{{ base_url }}/" class="back-link">&larr; Gallery</a>
            </nav>
        </header>

        <div class="main-layout">
            <div class="left-col">
                <div class="toolbar">
                    <input type="search" id="tag-search" placeholder="Search tags..." autocomplete="off">
                    {% if user and user.is_admin %}
                    <button id="new-tag-btn" class="btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        New Tag
                    </button>
                    <button id="manage-cats-btn" class="btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        Categories
                    </button>
                    <button id="sanitize-tags-btn" class="btn btn-secondary" title="Recalculate implied tags for all items">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        Sanitize
                    </button>
                    {% endif %}
                </div>

                <div class="tag-list-wrapper">
                    <div id="tag-list" class="tag-list">
                        <div class="empty-state">Loading tags...</div>
                    </div>
                    <div id="pagination-info" class="pagination-info"></div>
                </div>
            </div>

            <div class="right-col">
                <aside id="detail-panel" class="detail-panel empty">
                    <p>Select a tag to view details</p>
                </aside>
            </div>
        </div>
    </div>

    {% if user and user.is_admin %}
    <!-- Categories Modal -->
    <div id="categories-modal" class="modal-overlay">
        <div class="modal-box" style="max-width: 480px;">
            <h2>Categories</h2>
            <div id="categories-list" style="margin-bottom: 1rem;"></div>
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem;">
                <input type="text" id="new-cat-name" placeholder="Name" style="flex:1;">
                <input type="color" id="new-cat-color" value="#888888" style="width: 48px; height: 32px; padding: 0; border: none; background: none; cursor: pointer;">
                <button class="btn btn-small" onclick="createCategory()">Add</button>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeCategoriesModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- New Tag Modal -->
    <div id="new-tag-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>Create Tag</h2>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="new-tag-name" placeholder="e.g. silver_fox">
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="new-tag-display" placeholder="e.g. Silver Fox">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="new-tag-category">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" data-color="{{ cat.color }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn" onclick="createTag()">Create</button>
            </div>
        </div>
    </div>
    {% endif %}

    <script>
        window.__isAdmin = {{ 'true' if user and user.is_admin else 'false' }};
        window.__categories = {{ categories | tojson }};
    </script>
    <script src="{{ base_url }}/static/js/toast.js"></script>
    <script src="{{ base_url }}/static/js/tags-page.js"></script>
</body>
</html>
