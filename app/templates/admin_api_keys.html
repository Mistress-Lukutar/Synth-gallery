<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>API Keys - Synth Admin</title>
    <link rel="icon" type="image/svg+xml" href="{{ base_url }}/static/favicon.svg">
    <link rel="stylesheet" href="{{ base_url }}/static/style.css">
    <style>
        .admin-layout {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .admin-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .admin-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .admin-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .admin-nav a:hover {
            color: var(--text);
        }
        .admin-nav a.active {
            color: var(--accent);
        }
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }
        .back-link:hover {
            color: var(--text);
        }
        .key-actions {
            margin-bottom: 1.5rem;
        }
        .key-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .key-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .key-info {
            flex: 1;
            min-width: 0;
        }
        .key-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .key-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .key-meta span {
            margin-right: 1rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-badge.active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-badge.inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .key-item-actions {
            display: flex;
            gap: 0.5rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
        }
        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .key-display {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.875rem;
            word-break: break-all;
            margin-bottom: 1rem;
        }
        .warning-text {
            color: #eab308;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                </svg>
                API Keys
            </h1>
            <nav class="admin-nav">
                <a href="{{ base_url }}/admin/users">Users</a>
                <a href="{{ base_url }}/admin/api-keys" class="active">API Keys</a>
                <a href="{{ base_url }}/admin/backups">Backups</a>
                <a href="{{ base_url }}/admin/maintenance">Maintenance</a>
                <a href="{{ base_url }}/tags">Tags</a>
                <span style="color: var(--border);">|</span>
                <a href="{{ base_url }}/" class="back-link">&larr; Gallery</a>
            </nav>
        </header>

        <div class="key-actions">
            <button id="add-key-btn" class="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Create API Key
            </button>
        </div>

        <div id="key-list" class="key-list">
            <div class="empty-state">
                <p>Loading API keys...</p>
            </div>
        </div>
    </div>

    <!-- Create Key Modal -->
    <div id="add-key-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Create New API Key</h3>
            <div class="form-group">
                <label for="key-name">Name</label>
                <input type="text" id="key-name" placeholder="e.g., Production Agent" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="key-user">User</label>
                <select id="key-user">
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.display_name }} (@{{ u.username }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="key-expires">Expires (days, optional)</label>
                <input type="number" id="key-expires" placeholder="Leave empty for no expiration" min="1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn" onclick="createKey()">Create Key</button>
            </div>
        </div>
    </div>

    <!-- Show Key Modal (displayed once after creation) -->
    <div id="show-key-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>API Key Created</h3>
            <p class="warning-text">Copy this key now — it will not be shown again!</p>
            <div class="key-display" id="new-key-value"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="copyKey()">Copy</button>
                <button class="btn" onclick="closeShowModal()">Done</button>
            </div>
        </div>
    </div>

    <script>
        function getCsrfToken() {
            const meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.getAttribute('content') : '';
        }

        async function csrfFetch(url, options = {}) {
            const headers = options.headers || {};
            if (['POST', 'PUT', 'DELETE', 'PATCH'].includes((options.method || 'GET').toUpperCase())) {
                headers['X-CSRF-Token'] = getCsrfToken();
            }
            return fetch(url, { ...options, headers });
        }

        // Load keys on page load
        async function loadKeys() {
            try {
                const resp = await csrfFetch('{{ base_url }}/api/admin/api-keys');
                if (!resp.ok) throw new Error('Failed to load keys');
                const data = await resp.json();
                renderKeys(data.keys);
            } catch (err) {
                document.getElementById('key-list').innerHTML = `
                    <div class="empty-state">
                        <p>Error loading API keys</p>
                    </div>
                `;
            }
        }

        function renderKeys(keys) {
            const container = document.getElementById('key-list');
            if (!keys || keys.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No API keys found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = keys.map(k => `
                <div class="key-item" data-id="${k.id}">
                    <div class="key-info">
                        <div class="key-name">
                            ${escapeHtml(k.name)}
                            <span class="status-badge ${k.is_active ? 'active' : 'inactive'}">
                                ${k.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </div>
                        <div class="key-meta">
                            <span>User: ${escapeHtml(k.user_display_name || k.user_username)}</span>
                            <span>Created: ${formatDate(k.created_at)}</span>
                            ${k.expires_at ? `<span>Expires: ${formatDate(k.expires_at)}</span>` : ''}
                            ${k.last_used_at ? `<span>Last used: ${formatDate(k.last_used_at)}</span>` : '<span>Never used</span>'}
                        </div>
                    </div>
                    <div class="key-item-actions">
                        <button class="btn btn-small btn-secondary" onclick="toggleKey(${k.id})">
                            ${k.is_active ? 'Deactivate' : 'Activate'}
                        </button>
                        <button class="btn btn-small btn-danger" onclick="deleteKey(${k.id})">
                            Revoke
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(iso) {
            if (!iso) return 'Unknown';
            const d = new Date(iso);
            return isNaN(d) ? iso : d.toLocaleDateString();
        }

        // Create key modal
        document.getElementById('add-key-btn').addEventListener('click', () => {
            document.getElementById('add-key-modal').classList.add('active');
        });

        function closeCreateModal() {
            document.getElementById('add-key-modal').classList.remove('active');
            document.getElementById('key-name').value = '';
            document.getElementById('key-expires').value = '';
        }

        async function createKey() {
            const name = document.getElementById('key-name').value.trim();
            const userId = parseInt(document.getElementById('key-user').value, 10);
            const expiresDays = document.getElementById('key-expires').value;

            if (!name) {
                showToast('Please enter a name', true);
                return;
            }

            try {
                const resp = await csrfFetch('{{ base_url }}/api/admin/api-keys', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        user_id: userId,
                        expires_days: expiresDays ? parseInt(expiresDays, 10) : null
                    })
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Failed to create API key');
                }

                const data = await resp.json();
                closeCreateModal();
                document.getElementById('new-key-value').textContent = data.api_key;
                document.getElementById('show-key-modal').classList.add('active');
                loadKeys();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        function closeShowModal() {
            document.getElementById('show-key-modal').classList.remove('active');
        }

        async function copyKey() {
            const key = document.getElementById('new-key-value').textContent;
            try {
                await navigator.clipboard.writeText(key);
                showToast('Key copied to clipboard');
            } catch {
                showToast('Failed to copy', true);
            }
        }

        async function toggleKey(keyId) {
            try {
                const resp = await csrfFetch(`{{ base_url }}/api/admin/api-keys/${keyId}/toggle`, {
                    method: 'POST'
                });
                if (!resp.ok) throw new Error('Failed to toggle key');
                showToast('Key status updated');
                loadKeys();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        async function deleteKey(keyId) {
            if (!confirm('Revoke this API key? This action cannot be undone.')) return;

            try {
                const resp = await csrfFetch(`{{ base_url }}/api/admin/api-keys/${keyId}`, {
                    method: 'DELETE'
                });
                if (!resp.ok) throw new Error('Failed to revoke key');
                showToast('Key revoked');
                loadKeys();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Close modals on overlay click
        document.getElementById('add-key-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('add-key-modal')) closeCreateModal();
        });
        document.getElementById('show-key-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('show-key-modal')) closeShowModal();
        });

        loadKeys();
    </script>
    <script src="{{ base_url }}/static/js/toast.js"></script>
</body>
</html>
