<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Synth</title>
    <link rel="icon" type="image/svg+xml" href="{{ base_url }}/static/favicon.svg">
    <link rel="stylesheet" href="{{ base_url }}/static/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
            padding-bottom: 2rem;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .login-header .logo-icon {
            width: 32px;
            height: 32px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            gap: 1rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .hardware-key-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .hardware-key-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        .hardware-key-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hardware-key-btn svg {
            width: 20px;
            height: 20px;
        }

        .hardware-key-section {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transform: translateY(-10px);
            transition: opacity 0.25s ease, max-height 0.25s ease, transform 0.25s ease;
        }

        .hardware-key-section.visible {
            opacity: 1;
            max-height: 200px;
            transform: translateY(0);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: var(--accent);
            font-size: 0.9rem;
            text-decoration: none;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        /* Recovery Key Modal */
        .recovery-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .recovery-modal.visible {
            opacity: 1;
            visibility: visible;
        }

        .recovery-modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .recovery-modal h3 {
            margin-top: 0;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .recovery-modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .recovery-key-input {
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .recovery-modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .recovery-modal-actions button {
            flex: 1;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recovery-modal-actions .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .recovery-modal-actions .btn-primary:hover {
            background: var(--accent-hover);
        }

        .recovery-modal-actions .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .recovery-modal-actions .btn-secondary:hover {
            background: var(--bg-secondary);
        }

        .recovery-modal-actions .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="{{ base_url }}/" class="logo">
                    <img src="{{ base_url }}/static/favicon.svg" alt="" class="logo-icon">
                    Synth
                </a>
                <p>Sign in to access the gallery</p>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ base_url }}/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username"
                           value="{{ username or '' }}"
                           required autofocus autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="forgot-password">
                <a href="#" id="recovery-key-link">Forgot password? Use recovery key</a>
            </div>

            <!-- Hardware Key Login Section (shown when user has keys) -->
            <div id="hardware-key-section" class="hardware-key-section">
                <div class="divider"><span>or</span></div>
                <button type="button" id="hardware-key-btn" class="hardware-key-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Sign in with Hardware Key
                </button>
            </div>
        </div>
    </div>

    <!-- Recovery Key Modal -->
    <div id="recovery-modal" class="recovery-modal">
        <div class="recovery-modal-content">
            <h3>Sign in with Recovery Key</h3>
            <p>Enter your username and recovery key to regain access to your account. You will be required to set a new password.</p>
            
            <div id="recovery-error" class="error-message hidden"></div>
            <div id="recovery-success" class="success-message hidden"></div>
            
            <div class="form-group">
                <label for="recovery-username">Username</label>
                <input type="text" id="recovery-username" class="recovery-key-input" placeholder="Enter your username" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="recovery-key-input">Recovery Key</label>
                <input type="text" id="recovery-key-input" class="recovery-key-input" placeholder="XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX-XXXX" autocomplete="off">
            </div>
            
            <div class="recovery-modal-actions">
                <button id="recovery-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="recovery-submit-btn" class="btn-primary">Sign In with Recovery Key</button>
            </div>
        </div>
    </div>

    <script>
        window.SYNTH_BASE_URL = '{{ base_url }}';
    </script>
    <script src="{{ base_url }}/static/js/core.js"></script>
    <script src="{{ base_url }}/static/js/login.js"></script>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
