{% extends "base.html" %}

{% block extra_head %}
<!-- EasyMDE Markdown Editor -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<!-- Font Awesome for EasyMDE icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<!-- Highlight.js for code syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- KaTeX for LaTeX math rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
<!-- Marked.js for rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
{% endblock %}

{% block content %}
<!-- Photo Lightbox Modal -->
<div id="lightbox" class="lightbox hidden">
    <div class="lightbox-overlay"></div>
    
    <!-- Top bar with close button only -->
    <div class="lightbox-top-bar">
        <button class="lightbox-close" title="Close (Esc)">&times;</button>
    </div>
    
    <!-- Bottom bar with action buttons (right-aligned) -->
    <div class="lightbox-bottom-bar">
        <div class="lightbox-bottom-spacer"></div>
        <button id="lightbox-edit-album" class="lightbox-bottom-btn hidden" onclick="openAlbumEditor()" title="Edit Album">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
            </svg>
        </button>
        <button id="lightbox-edit-details" class="lightbox-bottom-btn" onclick="openItemDetails()" title="Edit Details">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        </button>
    </div>
    
    <button class="lightbox-nav lightbox-prev" title="Previous (←)">‹</button>
    <button class="lightbox-nav lightbox-next" title="Next (→)">›</button>

    <div class="lightbox-album-indicator hidden" id="lightbox-album-indicator">
        <div class="album-indicator-bars" id="lightbox-album-bars"></div>
    </div>

    <div class="lightbox-main">
        <div class="lightbox-content">
            <div class="lightbox-media" id="lightbox-media"></div>
        </div>
    </div>
    
    <!-- Unified Item Details Panel -->
    <div id="item-details-panel" class="item-details-panel">
        <div class="item-details-header">
            <h3>Details</h3>
            <button class="btn-close item-details-close" onclick="closeItemDetails()">&times;</button>
        </div>
        
        <div class="item-details-body">
            <!-- METADATA SECTION -->
            <div class="metadata-section">
                <div class="metadata-editable">
                    <div class="field-group">
                        <label for="item-title">Title</label>
                        <input type="text" id="item-title" data-field="title" placeholder="Add a title...">
                    </div>
                    
                    <div class="field-group">
                        <label>Description</label>
                        <div class="description-editor-wrapper">
                            <textarea id="item-description" data-field="description" placeholder="Add a description..." style="display: none;"></textarea>
                            <div id="item-description-preview" class="markdown-preview hidden"></div>
                        </div>
                        <div class="description-toolbar">
                            <button type="button" id="desc-toggle-btn" class="desc-tool-btn" onclick="toggleDescriptionMode()">
                                <span id="desc-toggle-text">Preview</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Collapsible Details Section -->
                <div class="metadata-details collapsible">
                    <button class="collapsible-toggle" onclick="toggleDetailsSection()">
                        <span class="toggle-icon">▼</span>
                        <span>Details</span>
                    </button>
                    <div class="collapsible-content" id="details-content">
                        <div class="detail-row">
                            <span class="detail-label">Filename</span>
                            <span class="detail-value" id="detail-filename">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Type</span>
                            <span class="detail-value" id="detail-type">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Size</span>
                            <span class="detail-value" id="detail-size">-</span>
                        </div>
                        <div class="detail-row" id="detail-dimensions-row">
                            <span class="detail-label">Dimensions</span>
                            <span class="detail-value" id="detail-dimensions">-</span>
                        </div>
                        <div class="detail-row hidden" id="detail-duration-row">
                            <span class="detail-label">Duration</span>
                            <span class="detail-value" id="detail-duration">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Uploaded</span>
                            <span class="detail-value" id="detail-uploaded">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Modified</span>
                            <span class="detail-value" id="detail-modified">-</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Date Taken</span>
                            <span class="detail-value" id="detail-taken-at">-</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="details-divider"></div>
            
            <!-- TAGS SECTION (keep existing tag structure) -->
            <div class="tags-section-panel">
                <div class="current-tags-section">
                    <label>Tags:</label>
                    <div id="current-tags-container" class="selected-tags-container">
                        <span class="no-tags-hint">No tags selected</span>
                    </div>
                </div>
                
                <div class="tag-search-container">
                    <input type="text" id="tag-search" placeholder="Search tags..." autocomplete="off">
                </div>
                
                <div id="category-tabs" class="category-tabs"></div>
                <div id="tag-tree-container" class="tag-tree-container"></div>
            </div>
        </div>
    </div>
    
    <!-- Album Editor Panel - inside lightbox for proper positioning -->
    <div id="album-editor-panel" class="album-editor-panel">
        <div class="album-editor-header">
            <h3>Edit Album</h3>
            <button class="btn-close album-editor-close" onclick="closeAlbumEditor()">&times;</button>
        </div>
        <div class="album-editor-body">
            <!-- Photos grid with cover selection, reordering, and add button -->
            <div class="album-editor-section photos-section">
                <label>Photos <span id="album-photo-count">(0)</span> <small>(click to set cover, drag to reorder)</small></label>
                <div id="album-photos-list" class="album-photos-list photo-grid">
                    <!-- Photos will be rendered here -->
                </div>
            </div>
        </div>
        <div class="album-editor-footer">
            <button class="btn btn-secondary" onclick="closeAlbumEditor()">Close</button>
        </div>
    </div>
</div>

<!-- Add Photos Modal -->
<div id="add-photos-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Photos to Album</h3>
            <button class="btn-close" onclick="closeAddPhotosModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="available-photos-grid" id="available-photos-grid"></div>
            <div class="selected-count" id="selected-photos-count">0 selected</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeAddPhotosModal()">Cancel</button>
            <button class="btn" id="confirm-add-btn" onclick="confirmAddPhotos()" disabled>Add Selected</button>
        </div>
    </div>
</div>

<!-- Folder Header -->
<div class="folder-header">
    <div class="folder-header-left">
        <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle folders">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
        </button>
        <div class="folder-title">
            <h2>Gallery</h2>
        </div>
        <div class="folder-actions">
            <button id="folder-upload-btn" class="folder-action-btn" title="Upload" onclick="openUploadModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </button>
            <div class="sort-dropdown">
                <button id="sort-btn" class="folder-action-btn" title="Sort by">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                        <path d="M7 4v16M7 4l-4 4M7 4l4 4"/>
                        <path d="M17 20V4M17 20l-4-4M17 20l4-4"/>
                    </svg>
                </button>
                <div id="sort-menu" class="sort-menu hidden">
                    <button class="sort-option" data-sort="taken">Capture date</button>
                    <button class="sort-option active" data-sort="uploaded">Upload date</button>
                </div>
            </div>
            <button class="folder-action-btn" title="Share" onclick="openShareModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <circle cx="18" cy="5" r="3"/>
                    <circle cx="6" cy="12" r="3"/>
                    <circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
            </button>
            <button class="folder-action-btn" title="Edit folder" onclick="openEditFolder()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </button>
            
            <!-- Selection Menu - inline with folder actions -->
            <div id="selection-menu" class="selection-menu hidden">
                <span id="selection-count">0</span>
                <button id="select-all-btn" class="selection-action-btn" title="Select All">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18">
                        <rect x="5" y="5" width="14" height="14" rx="2" stroke-width="2.5"/>
                        <rect x="2" y="2" width="14" height="14" rx="2" stroke-dasharray="3 2" stroke-width="1.5"/>
                    </svg>
                </button>
                <button id="deselect-all-btn" class="selection-action-btn" title="Deselect All">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                        <line x1="6" y1="6" x2="18" y2="18"/>
                        <line x1="18" y1="6" x2="6" y2="18"/>
                    </svg>
                </button>
                <button id="download-selected-btn" class="selection-action-btn" title="Download">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button id="move-selected-btn" class="selection-action-btn" title="Move to folder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        <polyline points="12 11 12 17"/>
                        <polyline points="9 14 12 11 15 14"/>
                    </svg>
                </button>
                <button id="copy-selected-btn" class="selection-action-btn" title="Copy to folder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
                <button id="delete-selected-btn" class="selection-action-btn selection-action-btn--danger" title="Delete">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <div class="folder-header-right">
        <div id="download-progress" class="download-progress hidden">
            <div class="download-progress-bar">
                <div id="download-progress-fill" class="download-progress-fill"></div>
            </div>
            <span id="download-progress-text">Preparing...</span>
        </div>
        <div class="search-container">
            <input type="text" id="tag-search-input" placeholder="Search..." autocomplete="off" aria-label="Search tags">
            <div id="tag-suggestions" class="suggestions hidden"></div>
        </div>
    </div>
</div>

<!-- Subfolders section (SPA rendered) -->
<div class="subfolders-section" id="subfolders-section" style="display: none;"></div>

<!-- Gallery grid (SPA rendered) -->
<div class="gallery" id="gallery" style="opacity: 0; transition: opacity 0.15s;">
    <!-- Content loaded via API -->
</div>

<!-- Initial folder ID for init.js -->
<script>
window.INITIAL_FOLDER_ID = '{{ initial_folder_id }}';
</script>
{% endblock %}
